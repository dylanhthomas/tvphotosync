name: Sync iCloud album to Google Photos

on:
  schedule:
    # Every 20 minutes. GitHub may delay scheduled runs; that's fine here.
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

# Needed so the job can commit the updated state.json back to the repo.
permissions:
  contents: write

concurrency:
  group: photo-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Sync
        env:
          ICLOUD_ALBUM_TOKEN: ${{ secrets.ICLOUD_ALBUM_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_ALBUM_TITLE: ${{ vars.GOOGLE_ALBUM_TITLE }}
        run: python sync.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update sync state [skip ci]"
            git push
          fi
